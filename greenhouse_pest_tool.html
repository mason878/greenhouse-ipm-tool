<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Green Legacy - Greenhouse IPM Tool</title>
<style>
:root{--bg:#f5f7f0;--card:#fff;--primary:#2d6a2e;--primary-light:#e8f5e9;--accent:#1b5e20;--text:#1a1a1a;--text-sec:#555;--border:#dde5d5;--in-stock:#2e7d32;--low-stock:#f57f17;--no-stock:#c62828;--excellent:#1b5e20;--good:#33691e;--fair:#f9a825;--irac:#1565c0;--frac:#6a1b9a;--radius:12px;--shadow:0 2px 8px rgba(0,0,0,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased;max-width:480px;margin:0 auto;padding-bottom:80px}
.header{background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;padding:16px 20px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.15)}
.header h1{font-size:18px;font-weight:700}.header p{font-size:11px;opacity:.85;margin-top:2px}
.tab-bar{display:flex;background:var(--card);border-bottom:2px solid var(--border);position:sticky;top:58px;z-index:99}
.tab{flex:1;padding:12px;text-align:center;font-size:14px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--text-sec);border-bottom:3px solid transparent;transition:all .2s}
.tab.active{color:var(--primary);border-bottom-color:var(--primary);background:var(--primary-light)}
.search-bar{padding:10px 16px;position:sticky;top:107px;z-index:98;background:var(--bg)}
.search-bar input{width:100%;padding:10px 16px;border:2px solid var(--border);border-radius:24px;font-size:14px;outline:none;background:var(--card)}
.search-bar input:focus{border-color:var(--primary)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px 16px}
.pest-card{background:var(--card);border-radius:var(--radius);padding:14px;cursor:pointer;border:2px solid var(--border);transition:all .15s;text-align:center;box-shadow:var(--shadow)}
.pest-card:active{transform:scale(.97)}
.pest-card .icon{font-size:28px;margin-bottom:6px}.pest-card .name{font-size:13px;font-weight:600}.pest-card .sci{font-size:10px;color:var(--text-sec);font-style:italic}
.section-label{padding:8px 16px;font-size:12px;font-weight:700;text-transform:uppercase;color:var(--text-sec);letter-spacing:.5px}
.detail-header{padding:16px;background:var(--card);border-bottom:1px solid var(--border);margin-bottom:4px}
.detail-header .back{font-size:14px;color:var(--primary);cursor:pointer;font-weight:600;border:none;background:none;padding:4px 0;margin-bottom:8px;display:block}
.detail-header h2{font-size:20px;font-weight:700}.detail-header .desc{font-size:13px;color:var(--text-sec);margin-top:4px}
.ipm-box{margin:8px 16px;padding:12px;background:#e3f2fd;border-radius:var(--radius);border:1px solid #bbdefb;font-size:12px;line-height:1.5}
.ipm-box h3{font-size:13px;font-weight:700;color:#0d47a1;margin-bottom:6px}
.ipm-box .strategy{margin-bottom:6px}
.ipm-box .strat-label{font-weight:700;color:#1565c0;font-size:11px;text-transform:uppercase}
.ipm-box .strat-text{color:#1a1a1a}
.chem-card{background:var(--card);border-radius:var(--radius);margin:8px 16px;padding:14px;border-left:4px solid var(--primary);box-shadow:var(--shadow)}
.chem-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.chem-name{font-size:16px;font-weight:700}.chem-ai{font-size:12px;color:var(--text-sec)}
.badges{display:flex;flex-wrap:wrap;gap:4px;margin:6px 0}
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px}
.badge.irac{background:#e3f2fd;color:var(--irac)}.badge.frac{background:#f3e5f5;color:var(--frac)}.badge.eff{background:#e8f5e9;color:#2e7d32}
.stages{display:flex;gap:4px;margin:8px 0 4px}
.stage{flex:1;text-align:center;padding:6px 4px;border-radius:8px;font-size:10px;font-weight:600;border:1px solid var(--border)}
.stage .s-label{font-size:9px;color:var(--text-sec);text-transform:uppercase}.stage .s-icon{font-size:14px;margin-bottom:1px}
.stage.yes{background:#e8f5e9;border-color:#a5d6a7;color:var(--in-stock)}
.stage.partial{background:#fff8e1;border-color:#ffe082;color:#f57f17}
.stage.no{background:#fafafa;border-color:#eee;color:#bbb}
.action-type{display:flex;gap:6px;margin:8px 0}
.action-tag{font-size:11px;font-weight:700;padding:4px 10px;border-radius:8px}
.action-tag.preventive{background:#e3f2fd;color:#1565c0}.action-tag.curative{background:#fce4ec;color:#c62828}.action-tag.both{background:#f3e5f5;color:#6a1b9a}
.chem-details{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px;font-size:12px}
.chem-detail{background:#f8f9f5;padding:8px;border-radius:8px}
.chem-detail .label{font-size:10px;text-transform:uppercase;color:var(--text-sec);font-weight:600;letter-spacing:.3px}
.chem-detail .value{font-weight:600;margin-top:2px;font-size:13px}
.notes-box{margin-top:8px;padding:8px;background:#fffde7;border-radius:8px;font-size:11px;color:#5d4037;line-height:1.4}
.combo-box{margin-top:8px;padding:8px;background:#e8eaf6;border-radius:8px;font-size:11px;color:#283593;line-height:1.4;border:1px solid #c5cae9}
.combo-box strong{color:#1a237e}
.disclaimer{margin:8px 16px;padding:10px;background:#fff3e0;border-radius:var(--radius);font-size:11px;color:#e65100;line-height:1.4;border:1px solid #ffe0b2}
.legend{margin:0 16px 8px;padding:10px;background:var(--card);border-radius:var(--radius);font-size:11px;display:flex;flex-wrap:wrap;gap:8px;box-shadow:var(--shadow)}
.legend-item{display:flex;align-items:center;gap:4px}
.eff-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:2px;vertical-align:middle}
.eff-dot.excellent{background:var(--excellent)}.eff-dot.good{background:var(--good)}.eff-dot.fair{background:var(--fair)}
#pestList,#diseaseList,#detailView{display:none}.visible{display:block!important}.grid-visible{display:grid!important}
</style>
</head>
<body>
<div class="header"><h1>Greenhouse IPM Decision Tool</h1><p>Green Legacy &mdash; Label-Based Chemical Recommendations</p></div>
<div class="tab-bar"><button class="tab active" onclick="showTab('pest')">Pests</button><button class="tab" onclick="showTab('disease')">Diseases</button></div>
<div class="search-bar"><input type="text" id="searchInput" placeholder="Search pests, diseases, or chemicals..." oninput="filterCards()"></div>
<div id="pestList" class="grid-visible"></div>
<div id="diseaseList"></div>
<div id="detailView"></div>

var ipmStrategies={"aphids":{scouting:"Check new growth, leaf undersides, buds weekly. Look for honeydew and cast skins. Yellow sticky cards for winged adults.",cultural:"Screen vents. Remove heavily infested plants. Avoid excess nitrogen.",biological:"Aphidius colemani/ervi parasitic wasps. Banker plant systems.",chemRotation:"Knockdown (Ventigra or Aria) -> Systemic drench (Altus or Flagship) -> Biological (Velifer or BotaniGard) -> repeat. Rotate IRAC groups each app."},"thrips":{scouting:"Blue sticky cards at canopy height. Tap flowers over white paper. Monitor weekly. Threshold: 1-5 per card/week.",cultural:"Screen vents (150+ mesh). Remove weeds. Discard spent blooms. Mass trapping blue cards.",biological:"Amblyseius swirskii or Neoseiulus cucumeris on foliage. Stratiolaelaps for soil pupae. Orius for flowers.",chemRotation:"Conserve SC (5) -> Mainspring drench (28) -> Overture (UN) -> Xxpire (5+4C). 7-10 day intervals. Target blooms."},"whiteflies":{scouting:"Yellow sticky cards at canopy. Shake plants for adults. Check leaf undersides for sessile nymphs. Weekly.",cultural:"Screen vents. Yellow traps. Remove infested stock. Inspect ALL incoming material.",biological:"Encarsia formosa or Eretmocerus eremicus wasps. Amblyseius swirskii for eggs/crawlers.",chemRotation:"Ventigra foliar (9D) -> Fulcrum foliar IGR (7C) -> Mainspring drench (28) -> Aria foliar (29). Rotate MOA every app."},"fungus_gnats":{scouting:"Yellow sticky cards at media surface. Potato disk test (48 hrs). Adults = weak fliers near soil.",cultural:"Allow media to dry between irrigations. Fix leaks. Reduce organic matter. Clean algae. Bottom water.",biological:"Stratiolaelaps scimitus mites. Steinernema feltiae nematodes. Atheta coriaria rove beetles.",chemRotation:"Citation drench (17) -> Conserve drench (5) -> Mainspring drench (28) on 4-week rotation. Cultural controls are primary."},"spider_mites":{scouting:"Hand lens (10x+) on leaf undersides. Stippling on upper surface. Tap leaves over white paper. Check hot/dry areas first.",cultural:"Increase humidity. Avoid water stress. Syringe leaf undersides. Remove heavily infested plants.",biological:"Phytoseiulus persimilis (specialist). Neoseiulus californicus or Amblyseius andersoni preventively.",chemRotation:"Adulticide (Floramite 25) -> Ovicide (TetraSan 10B) 5-7 days later -> diff adulticide (Sultan 25A) 10 days later -> Ovicide (Notavo 10A). ALWAYS rotate MOA."},"broad_mites":{scouting:"CANNOT see without 20x+ magnification. Symptoms: downward leaf curling, bronzing of new growth, stunted points. Confirm with scope.",cultural:"Isolate immediately. Spread on hands/tools/clothing. Discard heavy. Hot water (111F/15 min) if feasible.",biological:"Amblyseius swirskii or Neoseiulus cucumeris preventively.",chemRotation:"Minx 2 (6, translaminar) -> Hachi-Hachi (21A) -> Savate (23, all stages). 7-day intervals. Translaminar essential."},"cyclamen_mites":{scouting:"Need 20x+ magnification. Twisted/curled leaves, stunted buds. Common on cyclamen, African violet, begonia, gerbera.",cultural:"Isolate immediately. Discard heavily damaged. Hide deep in buds/folded leaves.",biological:"Amblyseius cucumeris for some suppression.",chemRotation:"Minx 2 (6, translaminar) high volume -> repeat 7 days -> Hachi-Hachi (21A). High-volume critical."},"mealybugs":{scouting:"Check leaf axils, under leaves, stem joints, crown. White cottony masses, honeydew. Crawlers most susceptible.",cultural:"Inspect incoming material. Isolate infested. Remove heavy infestations. Difficult once established.",biological:"Cryptolaemus montrouzieri. Leptomastix dactylopii for citrus mealybug.",chemRotation:"Safari drench (4A) or Altus drench (4D) -> Foliar (Kontos 23 or Ventigra 9D) -> Contact (SuffOil-X) between. Systemics key for wax-protected pests."},"shore_flies":{scouting:"Larger than fungus gnats, smoky wings, 5 light spots. Fecal spots = main damage. Breed in algae.",cultural:"PRIMARY = CULTURAL. Eliminate algae. Reduce irrigation. Improve drainage. Fix leaks.",biological:"Steinernema feltiae nematodes some activity.",chemRotation:"Citation (17) or Fulcrum (7C) drench if needed. Cultural control of algae far more effective."},"caterpillars":{scouting:"Chewing damage, frass, larvae on foliage. Check undersides for eggs.",cultural:"Screen vents/doors. Pheromone traps. Hand-pick at low populations.",biological:"Trichogramma wasps parasitize eggs. Orius and lacewings feed on small larvae.",chemRotation:"DiPel (11A) -> Conserve SC (5) -> Mainspring (28) -> Sarisa (28). Apply when larvae are small."},"leafminers":{scouting:"Serpentine mines in leaves. Adult feeding punctures. Yellow sticky cards.",cultural:"Remove mined leaves. Yellow traps. Screen vents. Inspect incoming.",biological:"Diglyphus isaea and Dacnusa sibirica parasitic wasps. Very effective in greenhouse.",chemRotation:"Citation (17, systemic) -> Minx 2 (6, translaminar). Time to adult activity on cards."},"botrytis":{scouting:"Gray fuzzy sporulation on flowers/leaves/stems. Water-soaked lesions. >85% RH, 60-77F, poor air movement.",cultural:"ENVIRONMENTAL MANAGEMENT #1: HAF fans. Reduce humidity <85%. No overhead irrigation. Remove dead tissue. Space plants. Heat/vent evenings.",chemRotation:"Decree (17) -> Palladium (9+12) -> Postiva (7+3) -> Pageant (11+7) -> Echo (M5). Biologicals (Cease+Milstop) between conventional."},"powdery_mildew":{scouting:"White powdery growth on leaf surfaces. Distorted new growth. 68-86F, high RH, NOT leaf wetness.",cultural:"Increase air circulation. Avoid overcrowding. Free water actually inhibits PM.",chemRotation:"Postiva (7+3) -> Milstop (NC) -> Pageant (11+7) -> Milstop (NC). 7-10 day rotation."},"downy_mildew":{scouting:"Angular lesions on upper surface. Sporulation below. Requires free water. Devastating on I. walleriana.",cultural:"No overhead irrigation. Reduce leaf wetness. For I. walleriana, use resistant varieties (SunPatiens, Bounce impatiens).",chemRotation:"Orvego (45+40) -> Segovis (U15) -> Micora (40) -> Mural (11+7). Rotate oomycete FRAC groups. Preventive apps critical."},"pythium":{scouting:"Wilting despite wet media. Brown mushy roots. Damping-off of seedlings/cuttings. Cool wet conditions.",cultural:"Well-drained media. Avoid overwatering. Sanitize benches/floors. Clean water source. Discard collapsed plugs.",chemRotation:"Mefenoxam (4) -> Segway O (21) -> Segovis (U15) -> Mural (11+7). Rotate FRAC groups on 21-28 day drench intervals."},"phytophthora":{scouting:"Similar to Pythium - wilt, root/crown rot. Can also cause aerial blight (P. nicotianae). Often warmer than Pythium.",cultural:"Well-drained media. Elevate pots off floors. Sanitize recirculated water. Avoid splash.",chemRotation:"Mefenoxam (4) -> Segway O (21) -> Segovis (U15) -> Orvego (45+40) foliar for aerial. Rotate FRAC."},"rhizoctonia":{scouting:"Stem rot at soil line (wire stem). Web blight on foliage (warm humid). Brown lesions. Sclerotia in media.",cultural:"Avoid burying stems. Remove debris. Improve air circulation for web blight. Sanitize benches.",chemRotation:"Medallion (12) drench -> Mural (11+7) drench -> Pageant (11+7) drench. Layer Obtego biological at planting."},"fusarium":{scouting:"Vascular wilt - one-sided wilt, yellowing. Cut stem = brown vascular ring. Species-specific. Persists in media.",cultural:"SANITATION IS PRIMARY. Pathogen-free propagation material. Clean media. Disinfest tools. Discard infected plants + media. No cure.",chemRotation:"Few effective chemical options. Medallion (12) drench + Obtego biological at planting. OHP 6672 (1) drench. Prevention and sanitation are the real management."},"thielaviopsis":{scouting:"Black root rot. Stunted, chlorotic. Roots have black chlamydospores. pH >5.5 favors. Pansy, vinca, petunia, calibrachoa most susceptible.",cultural:"MANAGE pH <5.5 for susceptible crops. Acidify irrigation. Sanitize. Use fresh media. Discard infected.",chemRotation:"Medallion (12) drench (gold standard) -> Mural (11+7) drench -> OHP 6672 (1) drench. pH management is #1 tool."},"bacterial":{scouting:"Water-soaked lesions, wilting, soft rot, leaf spots. Erwinia, Pseudomonas, Xanthomonas. Spread by water splash, tools.",cultural:"SANITATION #1. Remove infected immediately. Disinfest tools (ZeroTol, bleach). No overhead irrigation. Reduce leaf wetness. No cure for systemic infections.",chemRotation:"Fire Wall (25, antibiotic) -> Phyton 35 (M1, copper) -> Cease (NC, biological). Preventive only. Remove infected plants - chemicals cannot cure bacterial diseases."},"rust":{scouting:"Orange/brown pustules on leaf undersides. Yellow spots on upper surface. Snapdragon, geranium common hosts. Spores spread by air.",cultural:"Remove infected leaves immediately. Improve air circulation. Avoid overhead irrigation. Resistant varieties when available.",chemRotation:"Postiva (7+3) -> Heritage (11) -> Pageant (11+7). Apply preventively at first sign. Remove infected tissue."},"alternaria":{scouting:"Dark brown/black concentric ring lesions (target spot). Leaf spots and blight. Favored by leaf wetness, moderate temps.",cultural:"Reduce leaf wetness. Improve air circulation. Remove infected debris. Avoid overhead irrigation.",chemRotation:"Pageant (11+7) -> Postiva (7+3) -> Palladium (9+12) -> Echo (M5). Apply preventively during favorable conditions."}};

var currentTab="pest";

function showTab(t){
  currentTab=t;
  var tabs=document.querySelectorAll(".tab");
  tabs[0].className=t==="pest"?"tab active":"tab";
  tabs[1].className=t==="disease"?"tab active":"tab";
  document.getElementById("pestList").className=t==="pest"?"grid-visible":"";
  document.getElementById("diseaseList").className=t==="disease"?"grid-visible":"";
  document.getElementById("detailView").className="";
  document.getElementById("searchInput").value="";
  renderList();
}

function renderList(){
  var list=currentTab==="pest"?pests:diseases;
  var el=document.getElementById(currentTab==="pest"?"pestList":"diseaseList");
  el.innerHTML="";
  list.forEach(function(p){
    var d=document.createElement("div");
    d.className="pest-card";
    d.onclick=function(){showDetail(p)};
    d.innerHTML='<div class="icon">'+p.icon+'</div><div class="name">'+p.name+'</div><div class="sci">'+p.sci+'</div>';
    el.appendChild(d);
  });
}

function getChems(id,type){
  var r=[];
  for(var k in C){
    var c=C[k];
    var t=type==="pest"?c.pests:c.diseases;
    if(t&&t[id]){
      var info=t[id];
      var eff=info.efficacy==="Excellent"?3:info.efficacy==="Good"?2:1;
      r.push({key:k,chem:c,info:info,effNum:eff});
    }
  }
  r.sort(function(a,b){return b.effNum-a.effNum});
  return r;
}

function parseRates(info){
  var method=info.method||"";
  var rate=info.rate||"";
  var results=[];
  if(rate.indexOf(";")!==-1){
    var parts=rate.split(";");
    parts.forEach(function(p){
      p=p.trim();
      if(!p)return;
      var m="Application";
      var r=p;
      var lower=p.toLowerCase();
      if(lower.indexOf("foliar")!==-1){m="Foliar spray";r=p.replace(/foliar\s*(spray)?/i,"").replace(/^[\s,;-]+|[\s,;-]+$/g,"").trim();}
      else if(lower.indexOf("drench")!==-1){m="Drench";r=p.replace(/drench/i,"").replace(/^[\s,;-]+|[\s,;-]+$/g,"").trim();}
      else if(lower.indexOf("surface")!==-1){m="Surface spray";r=p.replace(/surface\s*spray/i,"").replace(/^[\s,;-]+|[\s,;-]+$/g,"").trim();}
      if(!r||r.length<3)r=p;
      results.push({method:m,rate:r});
    });
  }
  else if(method.indexOf(" or ")!==-1){
    var methods=method.split(" or ");
    methods.forEach(function(m){
      m=m.trim();
      var clean=m.replace(/\(preferred\)/i,"").trim();
      var label=clean.charAt(0).toUpperCase()+clean.slice(1);
      var pref=m.toLowerCase().indexOf("preferred")!==-1?" (preferred)":"";
      if(method.toLowerCase().indexOf("preferred")!==-1&&m.toLowerCase().indexOf("preferred")===-1&&methods.indexOf(m)!==0){
        /* other method, not preferred */
      }
      results.push({method:label+pref,rate:rate});
    });
  }
  else{
    results.push({method:method,rate:rate});
  }
  return results;
}

function showDetail(p){
  var isPest=pests.indexOf(p)!==-1;
  var type=isPest?"pest":"disease";
  document.getElementById("pestList").className="";
  document.getElementById("diseaseList").className="";
  var dv=document.getElementById("detailView");
  dv.className="visible";
  var ipm=ipmStrategies[p.id];
  var chems=getChems(p.id,type);

  var h='<div class="detail-header">';
  h+='<button class="back" onclick="goBack()">&larr; Back to '+(isPest?"Pests":"Diseases")+'</button>';
  h+='<h2>'+p.icon+' '+p.name+'</h2>';
  h+='<div class="desc">'+p.sci+'</div>';
  h+='<div class="desc" style="margin-top:4px">'+p.desc+'</div>';
  h+='</div>';

  if(ipm){
    h+='<div class="ipm-box"><h3>IPM Strategy</h3>';
    h+='<div class="strategy"><span class="strat-label">Scouting: </span><span class="strat-text">'+ipm.scouting+'</span></div>';
    h+='<div class="strategy"><span class="strat-label">Cultural: </span><span class="strat-text">'+ipm.cultural+'</span></div>';
    if(ipm.biological){h+='<div class="strategy"><span class="strat-label">Biological: </span><span class="strat-text">'+ipm.biological+'</span></div>';}
    h+='<div class="strategy"><span class="strat-label">Chemical Rotation: </span><span class="strat-text">'+ipm.chemRotation+'</span></div>';
    h+='</div>';
  }

  h+='<div class="disclaimer">Always read and follow label directions. Rates are per 100 gal unless noted. Verify current EPA registration. Test new products on a small area first.</div>';

  h+='<div class="legend">';
  h+='<div class="legend-item"><span class="eff-dot excellent"></span> Excellent</div>';
  h+='<div class="legend-item"><span class="eff-dot good"></span> Good</div>';
  h+='<div class="legend-item"><span class="eff-dot fair"></span> Fair</div>';
  h+='</div>';

  h+='<div class="section-label">'+chems.length+' Chemical Options — sorted by efficacy</div>';
  chems.forEach(function(c){h+=renderCard(c,type);});
  dv.innerHTML=h;
  window.scrollTo(0,0);
}

function renderCard(c,type){
  var info=c.info;var chem=c.chem;
  var effClass=info.efficacy==="Excellent"?"excellent":info.efficacy==="Good"?"good":"fair";
  var groupBadge=chem.groupType==="IRAC"?"irac":"frac";

  var h='<div class="chem-card">';
  h+='<div class="chem-top"><div><div class="chem-name">'+chem.name+'</div><div class="chem-ai">'+chem.ai+'</div></div></div>';

  h+='<div class="badges">';
  h+='<span class="badge '+groupBadge+'">'+chem.groupType+' '+chem.group+'</span>';
  h+='<span class="badge eff" style="background:'+(effClass==="excellent"?"#e8f5e9":effClass==="good"?"#f1f8e9":"#fff8e1")+';color:'+(effClass==="excellent"?"#1b5e20":effClass==="good"?"#33691e":"#f57f17")+'">'+info.efficacy+'</span>';
  h+='<span class="badge" style="background:#fafafa;color:#555">REI '+chem.rei+'</span>';
  h+='</div>';

  if(type==="pest"&&info.stages){
    var s=info.stages;
    h+='<div class="stages">';
    h+='<div class="stage '+(s.E==="yes"?"yes":s.E==="partial"?"partial":"no")+'"><div class="s-icon">'+(s.E==="yes"?"✅":s.E==="partial"?"🟡":"—")+'</div><div class="s-label">Egg</div></div>';
    h+='<div class="stage '+(s.L==="yes"?"yes":s.L==="partial"?"partial":"no")+'"><div class="s-icon">'+(s.L==="yes"?"✅":s.L==="partial"?"🟡":"—")+'</div><div class="s-label">Larva</div></div>';
    h+='<div class="stage '+(s.A==="yes"?"yes":s.A==="partial"?"partial":"no")+'"><div class="s-icon">'+(s.A==="yes"?"✅":s.A==="partial"?"🟡":"—")+'</div><div class="s-label">Adult</div></div>';
    h+='</div>';
  }

  if(type==="disease"&&info.action){
    h+='<div class="action-type">';
    if(info.action==="both"){h+='<span class="action-tag both">Preventive + Curative</span>';}
    else if(info.action==="preventive"){h+='<span class="action-tag preventive">Preventive</span>';}
    else{h+='<span class="action-tag curative">Curative</span>';}
    h+='</div>';
  }

  var rates=parseRates(info);
  h+='<div style="margin-top:8px">';
  rates.forEach(function(r,i){
    var bg=i%2===0?"#f8f9f5":"#f0f2eb";
    h+='<div style="display:flex;gap:6px;padding:8px;background:'+bg+';border-radius:'+(i===0?"8px 8px":"0 0")+(i===rates.length-1?" 0 0 8px 8px":"")+';border-radius:8px;margin-bottom:2px">';
    h+='<div style="min-width:90px"><div style="font-size:10px;text-transform:uppercase;color:var(--text-sec);font-weight:600;letter-spacing:.3px">Method</div><div style="font-weight:600;font-size:13px;margin-top:2px">'+r.method+'</div></div>';
    h+='<div style="flex:1"><div style="font-size:10px;text-transform:uppercase;color:var(--text-sec);font-weight:600;letter-spacing:.3px">Rate</div><div style="font-weight:600;font-size:13px;margin-top:2px">'+r.rate+'</div></div>';
    h+='</div>';
  });
  h+='</div>';

  h+='<div class="notes-box">'+info.notes+'</div>';

  if(info.combo){
    h+='<div class="combo-box"><strong>Combo/Rotation: </strong>'+info.combo+'</div>';
  }

  h+='</div>';
  return h;
}

function goBack(){
  document.getElementById("detailView").className="";
  document.getElementById(currentTab==="pest"?"pestList":"diseaseList").className="grid-visible";
  window.scrollTo(0,0);
}

function filterCards(){
  var q=document.getElementById("searchInput").value.toLowerCase();
  var list=currentTab==="pest"?pests:diseases;
  var el=document.getElementById(currentTab==="pest"?"pestList":"diseaseList");
  el.innerHTML="";
  list.filter(function(p){
    return p.name.toLowerCase().indexOf(q)!==-1||p.sci.toLowerCase().indexOf(q)!==-1||p.desc.toLowerCase().indexOf(q)!==-1;
  }).forEach(function(p){
    var d=document.createElement("div");
    d.className="pest-card";
    d.onclick=function(){showDetail(p)};
    d.innerHTML='<div class="icon">'+p.icon+'</div><div class="name">'+p.name+'</div><div class="sci">'+p.sci+'</div>';
    el.appendChild(d);
  });
}

renderList();
